# Render.com free tier deployment (spins down after 15min inactivity)
# https://docs.render.com/free
services:
  - type: web
    name: cad-dxf-processor
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --production=false
    startCommand: node server.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
